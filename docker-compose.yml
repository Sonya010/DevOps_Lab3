services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: tasktracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webapp_network
    restart: unless-stopped

  webapp:
    image: ghcr.io/sonya010/devops_lab3:latest
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - webapp_network
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasktracker
      DB_USER: student
      DB_PASSWORD: ${DB_PASSWORD:-yourpassword}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - webapp_network
    restart: unless-stopped

networks:
  webapp_network:
    driver: bridge

volumes:
  postgres_data: